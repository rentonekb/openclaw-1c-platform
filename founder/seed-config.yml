founder:
  name: "OpenClaw 1C Platform Founder"
  version: "1.0.0"
  source:
    type: "git"
    url: "https://github.com/openclaw-1c-platform/openclaw-1c-platform.git"
    branch: "main"
  auto-update:
    enabled: true
    check-interval: "24h"

required-parameters:
  - name: "DOMAIN"
    prompt: "Домен для веб-интерфейса (например: monitor.company.ru)"
    validation: "fqdn"
    optional: true

  - name: "SSL_EMAIL"
    prompt: "Email для SSL-сертификата Let's Encrypt"
    validation: "email"
    optional: true

  - name: "TELEGRAM_TOKEN"
    prompt: "Токен Telegram-бота (получить у @BotFather)"
    validation: "telegram-token"
    secret: true
    default: "8700164293:AAGN2_VmK3YGdl61iJ17Yfrf4sxpJSqVisA"

  - name: "TIMEZONE"
    prompt: "Часовой пояс"
    default: "Asia/Yekaterinburg"
    options: ["Europe/Moscow","Europe/Samara","Asia/Yekaterinburg","Asia/Novosibirsk","Asia/Vladivostok"]

  - name: "ITS_LOGIN"
    prompt: "Логин от 1С ИТС"
    validation: "string"
    secret: true
    default: "info@constanta-t.ru"

  - name: "ITS_PASSWORD"
    prompt: "Пароль от 1С ИТС"
    validation: "string"
    secret: true
    default: "info@constanta-t.ru"
