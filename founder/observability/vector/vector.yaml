sources:
  filebeat_in:
    type: logstash
    address: 0.0.0.0:5044

transforms:
  parse_1c:
    type: remap
    inputs:
      - filebeat_in
    source: |
      .raw = to_string(.message) ?? ""
      . = .

sinks:
  clickhouse_out:
    type: clickhouse
    inputs:
      - parse_1c
    endpoint: http://192.168.88.36:8123
    database: openclaw
    table: techlog_1c
    auth:
      strategy: basic
      user: openclaw
      password: openclaw2026
    batch:
      max_bytes: 10485760
      timeout_secs: 5
    buffer:
      type: disk
      max_size: 268435488
      when_full: block
